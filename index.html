<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c96e2e">
<title>Thornvyr</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    user-select: none; -webkit-user-select: none;
    background: radial-gradient(ellipse at top, #e8a668 0%, #c96e2e 60%, #8a4420 100%);
    color: #fff;
    touch-action: manipulation;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(2px 2px at 10% 20%, rgba(255,220,180,0.35), transparent),
      radial-gradient(1.5px 1.5px at 80% 30%, rgba(255,200,150,0.3), transparent),
      radial-gradient(2px 3px at 30% 70%, rgba(200,100,50,0.4), transparent),
      radial-gradient(2px 2px at 70% 85%, rgba(255,220,180,0.25), transparent),
      radial-gradient(1px 2px at 50% 10%, rgba(255,200,150,0.3), transparent);
    background-size: 100% 100%;
  }
  .app {
    position: relative; display: flex; flex-direction: column;
    height: 100vh; height: 100dvh; max-width: 560px; margin: 0 auto;
  }

  /* HUD */
  .hud {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; font-size: 15px; font-weight: 600;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
  }
  .hud .stat { display: inline-flex; align-items: center; gap: 4px; }
  .hud .stat b { font-variant-numeric: tabular-nums; }
  .hud .spacer { flex: 1; }
  .hud .icon-btn {
    width: 34px; height: 34px; border: none; border-radius: 50%;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 18px;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s;
  }
  .hud .icon-btn:hover { background: rgba(255,255,255,0.25); }
  .hud .icon-btn:active { transform: scale(0.9); }

  /* Arena */
  .arena-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
  .arena {
    position: relative; width: min(92vmin, 500px); aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
  }

  /* Center */
  .center {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    z-index: 2; pointer-events: none;
  }
  .boss-core {
    width: 72px; height: 72px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff2d4 0%, #f6a85b 35%, #a83c1a 100%);
    box-shadow: 0 0 30px rgba(255,150,80,0.6), inset 0 0 18px rgba(140,40,10,0.4);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); filter: brightness(1); }
    50%     { transform: scale(1.06); filter: brightness(1.1); }
  }
  .cast-bar {
    position: relative; width: 220px; max-width: 60vw; height: 18px;
    background: rgba(0,0,0,0.55); border-radius: 9px; overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.4);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.2s;
  }
  .cast-bar.active { opacity: 1; }
  .cast-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: linear-gradient(90deg, #34d0b0, #1a9d8e);
    width: 0%; transition: width linear 0s;
    border-radius: 9px;
  }
  .cast-fill.warn { background: linear-gradient(90deg, #f7d65a, #dd9b2e); }
  .cast-fill.danger { background: linear-gradient(90deg, #ff8a5b, #e0452a); }

  /* Pillar — medallion with shape icon, optional glowing border-ring */
  .pillar {
    position: absolute; left: 50%; top: 50%;
    width: 110px; height: 110px;
    transform: translate(-50%, -50%);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, filter 0.3s;
  }
  .pillar:active { transform: translate(-50%, -50%) scale(0.92); }
  .pillar-glow {
    position: absolute; inset: -8px; border-radius: 50%;
    background:
      radial-gradient(circle, rgba(120,255,140,0.38) 0%, rgba(80,200,100,0.22) 45%, rgba(60,160,80,0.0) 68%);
    filter: blur(4px);
    animation: glow-pulse 1.8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glow-pulse {
    0%,100% { opacity: 0.85; transform: scale(1); }
    50%     { opacity: 1; transform: scale(1.04); }
  }
  .medallion {
    position: relative; width: 82%; height: 82%; border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, #1a3a36 0%, #0a2220 55%, #050f0e 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      inset 0 0 10px rgba(0,0,0,0.85),
      inset 0 2px 3px rgba(255,255,255,0.08),
      0 3px 6px rgba(0,0,0,0.55);
  }
  .medallion svg.icon { width: 72%; height: 72%; overflow: visible; display: block; }
  .medallion .border-ring {
    position: absolute; inset: -2%; border-radius: 50%;
    border: 3px solid #6ef0d4;
    box-shadow:
      0 0 10px rgba(110,240,212,0.75),
      0 0 18px rgba(110,240,212,0.35),
      inset 0 0 5px rgba(110,240,212,0.4);
    pointer-events: none;
  }


  .pillar.correct .medallion { animation: flash-green 0.5s ease; }
  .pillar.wrong   .medallion { animation: flash-red   0.5s ease; }
  @keyframes flash-green {
    0% { box-shadow: inset 0 0 8px rgba(0,0,0,0.7), 0 0 40px rgba(80,255,100,1); }
    100% { box-shadow: inset 0 0 8px rgba(0,0,0,0.7); }
  }
  @keyframes flash-red {
    0% { box-shadow: inset 0 0 8px rgba(0,0,0,0.7), 0 0 40px rgba(255,80,60,1); }
    100% { box-shadow: inset 0 0 8px rgba(0,0,0,0.7); }
  }

  /* Mode switch */
  .modes {
    display: flex; gap: 12px; justify-content: center;
    padding: 14px 16px 22px;
  }
  .mode-btn {
    width: 56px; height: 56px; border-radius: 18px;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.35); color: #fff;
    font-size: 22px; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
    font-variant-numeric: tabular-nums;
  }
  .mode-btn.active {
    background: linear-gradient(180deg, #4ad3b6, #1a9d8e);
    border-color: #6ef0d4;
    box-shadow: 0 0 12px rgba(74,211,182,0.6);
  }
  .mode-btn:active { transform: scale(0.94); }

  /* Start overlay */
  .start-overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 28px;
    background: rgba(10,20,15,0.82);
    backdrop-filter: blur(4px);
    transition: opacity 0.3s;
  }
  .start-overlay.hidden { opacity: 0; pointer-events: none; }
  .start-title {
    font-size: 14px; font-weight: 500; letter-spacing: 3px; opacity: 0.8;
    text-transform: uppercase;
  }
  .start-boss {
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff2d4 0%, #f6a85b 35%, #a83c1a 100%);
    box-shadow: 0 0 40px rgba(255,150,80,0.6), inset 0 0 20px rgba(140,40,10,0.4);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .start-choice { display: flex; gap: 20px; }
  .start-choice .mode-btn { width: 90px; height: 90px; font-size: 36px; border-radius: 24px; }

  .hint {
    text-align: center; font-size: 12px; opacity: 0.6; margin-top: 4px;
    max-width: 260px; line-height: 1.4;
  }
  .hint b { font-weight: 700; }

  /* End overlay */
  .end-overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
    background: rgba(10,20,15,0.85);
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .end-overlay.visible { opacity: 1; pointer-events: auto; }
  .end-icon { font-size: 64px; }
  .end-stats { display: flex; gap: 24px; font-size: 18px; font-weight: 600; }
  .end-stat { text-align: center; }
  .end-stat small { display: block; font-size: 11px; opacity: 0.7; margin-bottom: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .end-actions { display: flex; gap: 14px; }
  .end-actions .mode-btn { width: 72px; height: 72px; font-size: 28px; }

  @media (max-width: 380px) {
    .pillar { width: 92px; height: 92px; }
    .cast-bar { width: 180px; }
    .boss-core { width: 58px; height: 58px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="hud">
    <span class="stat" title="Streak">⭐ <b id="streak">0</b></span>
    <span class="stat" title="Correct">✓ <b id="ok">0</b></span>
    <span class="stat" title="Wrong">✗ <b id="fail">0</b></span>
    <span class="stat" title="Avg reaction">⏱ <b id="avg">—</b></span>
    <span class="stat" title="Best streak">🏆 <b id="best">0</b></span>
    <span class="spacer"></span>
    <button class="icon-btn" id="resetBtn" title="Reset">↻</button>
  </header>

  <div class="arena-wrap">
    <div class="arena" id="arena">
      <div class="center">
        <div class="boss-core"></div>
        <div class="cast-bar" id="castBar"><div class="cast-fill" id="castFill"></div></div>
      </div>
      <!-- pillars injected by JS -->
    </div>
  </div>

  <footer class="modes">
    <button class="mode-btn" data-mode="1">1</button>
    <button class="mode-btn" data-mode="2">2</button>
  </footer>

  <div class="start-overlay" id="startOverlay">
    <div class="start-title">Thornvyr</div>
    <div class="start-boss"></div>
    <div class="start-choice">
      <button class="mode-btn" data-start="1">1</button>
      <button class="mode-btn" data-start="2">2</button>
    </div>
    <div class="hint">
      <span style="font-size:24px;">🥬 🍀</span><br>
      <b>1</b> → 4 &nbsp;·&nbsp; <b>2</b> → 5
    </div>
  </div>

  <div class="end-overlay" id="endOverlay">
    <div class="end-icon" id="endIcon">💀</div>
    <div class="end-stats">
      <div class="end-stat"><small>⭐</small><span id="endStreak">0</span></div>
      <div class="end-stat"><small>✓</small><span id="endOk">0</span></div>
      <div class="end-stat"><small>⏱ avg</small><span id="endAvg">—</span></div>
      <div class="end-stat"><small>🏆</small><span id="endBest">0</span></div>
    </div>
    <div class="end-actions">
      <button class="mode-btn" data-retry="1">1</button>
      <button class="mode-btn" data-retry="2">2</button>
    </div>
  </div>

</div>

<!-- SVG symbols: game-style icons with gradients (4 variants: leaf/clover × filled/empty) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- Radial gradient for filled icons (light center → teal edge, glossy) -->
    <radialGradient id="grad-filled" cx="36%" cy="28%" r="82%">
      <stop offset="0%"   stop-color="#d6fced"/>
      <stop offset="30%"  stop-color="#7ae6cc"/>
      <stop offset="70%"  stop-color="#3ec7b3"/>
      <stop offset="100%" stop-color="#2a897c"/>
    </radialGradient>

    <!-- Leaf path (reused by filled/empty variants) — wider, teardrop-almond -->
    <path id="leaf-shape" d="M50 10 C 18 14, 6 42, 14 66 C 20 86, 42 92, 50 92 C 58 92, 80 86, 86 66 C 94 42, 82 14, 50 10 Z"/>
    <path id="leaf-vein"  d="M50 22 Q 56 48, 52 72 Q 50 80, 50 86" fill="none"/>

    <!-- Clover: 4 heart-shape lobes (up / right / down / left), each tip touching center -->
    <g id="clover-shape">
      <!-- up -->
      <path d="M50 50 C 30 40, 20 20, 35 12 C 42 8, 48 14, 50 22 C 52 14, 58 8, 65 12 C 80 20, 70 40, 50 50 Z"/>
      <!-- right -->
      <path d="M50 50 C 60 30, 80 20, 88 35 C 92 42, 86 48, 78 50 C 86 52, 92 58, 88 65 C 80 80, 60 70, 50 50 Z"/>
      <!-- down -->
      <path d="M50 50 C 70 60, 80 80, 65 88 C 58 92, 52 86, 50 78 C 48 86, 42 92, 35 88 C 20 80, 30 60, 50 50 Z"/>
      <!-- left -->
      <path d="M50 50 C 40 70, 20 80, 12 65 C 8 58, 14 52, 22 50 C 14 48, 8 42, 12 35 C 20 20, 40 30, 50 50 Z"/>
    </g>

    <!-- Leaf filled: gradient body + dark vein -->
    <symbol id="sym-leaf-filled" viewBox="0 0 100 100">
      <use href="#leaf-shape" fill="url(#grad-filled)" stroke="#4cd9c3" stroke-width="1.5" stroke-linejoin="round"/>
      <use href="#leaf-vein"  stroke="#0a2220" stroke-width="3.2" stroke-linecap="round" fill="none"/>
    </symbol>

    <!-- Leaf empty: dark body + bright teal outline + bright vein -->
    <symbol id="sym-leaf-empty" viewBox="0 0 100 100">
      <use href="#leaf-shape" fill="#0a2220" stroke="#4cd9c3" stroke-width="5" stroke-linejoin="round"/>
      <use href="#leaf-vein"  stroke="#4cd9c3" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </symbol>

    <!-- Clover filled: gradient -->
    <symbol id="sym-clover-filled" viewBox="0 0 100 100">
      <g fill="url(#grad-filled)" stroke="#4cd9c3" stroke-width="1.5" stroke-linejoin="round">
        <use href="#clover-shape"/>
      </g>
    </symbol>

    <!-- Clover empty: outline only -->
    <symbol id="sym-clover-empty" viewBox="0 0 100 100">
      <g fill="#0a2220" stroke="#4cd9c3" stroke-width="5" stroke-linejoin="round">
        <use href="#clover-shape"/>
      </g>
    </symbol>
  </defs>
</svg>

<script>
"use strict";

const SHAPES = ["leaf", "clover"];
const COLORS = ["empty", "filled"];
const BORDERS = [false, true];

const PHASE_CONFIG = {
  1: { count: 4, duration: 3000 },
  2: { count: 5, duration: 2500 }
};

const state = {
  phase: null,
  pillars: [],
  uniqueIndex: -1,
  streak: 0,
  ok: 0,
  fail: 0,
  best: 0, // streak record per current session phase
  reactionTimes: [], // ms for correct answers
  roundStart: 0,
  castDuration: 0,
  roundActive: false,
  rafId: null,
  pending: null
};

// ---------- Utils ----------
const $ = (id) => document.getElementById(id);
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const other = (v, arr) => arr.find(x => x !== v);

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---------- Generation ----------
function generatePillars(count) {
  const uniqueAxis = pick(["shape", "color", "border"]);
  const majority = {
    shape: pick(SHAPES),
    color: pick(COLORS),
    border: pick(BORDERS)
  };
  const uniquePillar = {
    shape: uniqueAxis === "shape" ? other(majority.shape, SHAPES) : majority.shape,
    color: uniqueAxis === "color" ? other(majority.color, COLORS) : majority.color,
    border: uniqueAxis === "border" ? !majority.border : majority.border,
    unique: true
  };
  const pillars = [uniquePillar];
  for (let i = 0; i < count - 1; i++) {
    pillars.push({ ...majority, unique: false });
  }
  shuffle(pillars);
  const uniqueIndex = pillars.findIndex(p => p.unique);
  return { pillars, uniqueIndex };
}

function validateRound(pillars) {
  // Verify: exactly one axis has a single "unique" pillar
  const axes = ["shape", "color", "border"];
  const uniqueAxes = [];
  for (const axis of axes) {
    const counts = {};
    for (const p of pillars) {
      const k = String(p[axis]);
      counts[k] = (counts[k] || 0) + 1;
    }
    const values = Object.values(counts);
    if (values.length === 2 && (values[0] === 1 || values[1] === 1)) {
      uniqueAxes.push(axis);
    }
  }
  return uniqueAxes.length === 1;
}

// ---------- Rendering ----------
function renderPillars() {
  const arena = $("arena");
  // Remove existing
  arena.querySelectorAll(".pillar").forEach(el => el.remove());

  const n = state.pillars.length;
  const radiusPct = 37; // % of arena — 37% from center
  for (let i = 0; i < n; i++) {
    const p = state.pillars[i];
    const angle = -Math.PI / 2 + (i * 2 * Math.PI) / n;
    const x = 50 + radiusPct * Math.cos(angle);
    const y = 50 + radiusPct * Math.sin(angle);

    const el = document.createElement("div");
    el.className = `pillar ${p.color}`;
    el.style.left = x + "%";
    el.style.top = y + "%";
    el.dataset.index = i;

    el.innerHTML = `
      <div class="pillar-glow"></div>
      <div class="medallion">
        ${p.border ? '<div class="border-ring"></div>' : ""}
        <svg class="icon" viewBox="0 0 100 100" aria-hidden="true">
          <use href="#sym-${p.shape}-${p.color}"/>
        </svg>
      </div>
    `;
    el.addEventListener("click", () => onPillarClick(i));
    arena.appendChild(el);
  }
}

// ---------- Game loop ----------
function startRound() {
  const cfg = PHASE_CONFIG[state.phase];
  const round = generatePillars(cfg.count);
  state.pillars = round.pillars;
  state.uniqueIndex = round.uniqueIndex;
  state.castDuration = cfg.duration;
  state.roundStart = performance.now();
  state.roundActive = true;

  renderPillars();
  const bar = $("castBar");
  const fill = $("castFill");
  bar.classList.add("active");
  fill.classList.remove("warn", "danger");
  fill.style.transition = "none";
  fill.style.width = "100%";
  // Kick off the shrink animation next frame
  requestAnimationFrame(() => {
    fill.style.transition = `width ${cfg.duration}ms linear`;
    fill.style.width = "0%";
  });

  cancelAnimationFrame(state.rafId);
  tick();
}

function tick() {
  if (!state.roundActive) return;
  const elapsed = performance.now() - state.roundStart;
  const remaining = state.castDuration - elapsed;
  const fill = $("castFill");
  if (remaining < state.castDuration * 0.33 && !fill.classList.contains("warn")) {
    fill.classList.add("warn");
  }
  if (remaining < state.castDuration * 0.15 && !fill.classList.contains("danger")) {
    fill.classList.add("danger");
  }
  if (remaining <= 0) {
    // Timeout = miss
    onTimeout();
    return;
  }
  state.rafId = requestAnimationFrame(tick);
}

function onPillarClick(idx) {
  if (!state.roundActive) return;
  const pillar = state.pillars[idx];
  const el = document.querySelectorAll(".pillar")[idx];
  state.roundActive = false;
  cancelAnimationFrame(state.rafId);
  const elapsed = performance.now() - state.roundStart;

  if (pillar.unique) {
    el.classList.add("correct");
    state.ok += 1;
    state.streak += 1;
    state.reactionTimes.push(elapsed);
    if (state.streak > state.best) {
      state.best = state.streak;
      saveBest();
    }
    updateHUD();
    $("castBar").classList.remove("active");
    setTimeout(() => startRound(), 480);
  } else {
    el.classList.add("wrong");
    // Also highlight correct one briefly
    const correctEl = document.querySelectorAll(".pillar")[state.uniqueIndex];
    if (correctEl) correctEl.classList.add("correct");
    state.fail += 1;
    updateHUD();
    $("castBar").classList.remove("active");
    showEnd();
  }
}

function onTimeout() {
  state.roundActive = false;
  cancelAnimationFrame(state.rafId);
  // Highlight correct
  const correctEl = document.querySelectorAll(".pillar")[state.uniqueIndex];
  if (correctEl) correctEl.classList.add("wrong");
  state.fail += 1;
  updateHUD();
  $("castBar").classList.remove("active");
  showEnd();
}

// ---------- HUD + overlays ----------
function avgReactionSec() {
  if (state.reactionTimes.length === 0) return null;
  const sum = state.reactionTimes.reduce((a, b) => a + b, 0);
  return sum / state.reactionTimes.length / 1000;
}

function formatReaction(seconds) {
  if (seconds === null || isNaN(seconds)) return "—";
  return seconds.toFixed(2) + "s";
}

function updateHUD() {
  $("streak").textContent = state.streak;
  $("ok").textContent = state.ok;
  $("fail").textContent = state.fail;
  $("best").textContent = state.best;
  $("avg").textContent = formatReaction(avgReactionSec());
}

function showEnd() {
  $("endStreak").textContent = state.streak;
  $("endOk").textContent = state.ok;
  $("endAvg").textContent = formatReaction(avgReactionSec());
  $("endBest").textContent = state.best;
  $("endOverlay").classList.add("visible");
}

function hideEnd() {
  $("endOverlay").classList.remove("visible");
}

function showStart() {
  $("startOverlay").classList.remove("hidden");
}
function hideStart() {
  $("startOverlay").classList.add("hidden");
}

function setPhase(phase) {
  state.phase = phase;
  state.streak = 0;
  state.ok = 0;
  state.fail = 0;
  state.reactionTimes = [];
  state.best = loadBest(phase);
  updateHUD();
  // Update mode buttons
  document.querySelectorAll(".modes .mode-btn").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.dataset.mode, 10) === phase);
  });
}

// ---------- Persistence ----------
function bestKey(phase) { return `thornvyr.best.p${phase}`; }
function loadBest(phase) {
  const v = parseInt(localStorage.getItem(bestKey(phase)) || "0", 10);
  return isNaN(v) ? 0 : v;
}
function saveBest() {
  try { localStorage.setItem(bestKey(state.phase), String(state.best)); } catch(_) {}
}

// ---------- Controls ----------
function handleStart(phase) {
  setPhase(phase);
  hideStart();
  hideEnd();
  startRound();
}
function handleReset() {
  cancelAnimationFrame(state.rafId);
  state.roundActive = false;
  $("castBar").classList.remove("active");
  $("castFill").style.width = "0%";
  document.querySelectorAll(".pillar").forEach(el => el.remove());
  hideEnd();
  showStart();
}

document.querySelectorAll("[data-start]").forEach(btn => {
  btn.addEventListener("click", () => handleStart(parseInt(btn.dataset.start, 10)));
});
document.querySelectorAll("[data-retry]").forEach(btn => {
  btn.addEventListener("click", () => handleStart(parseInt(btn.dataset.retry, 10)));
});
document.querySelectorAll(".modes .mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const phase = parseInt(btn.dataset.mode, 10);
    if (phase === state.phase && state.roundActive) return;
    handleStart(phase);
  });
});
$("resetBtn").addEventListener("click", handleReset);

// Keyboard: 1 / 2 / R
document.addEventListener("keydown", (e) => {
  if (e.key === "1") handleStart(1);
  else if (e.key === "2") handleStart(2);
  else if (e.key === "r" || e.key === "R") handleReset();
});

// ---------- Self-test (dev) ----------
// Run in DevTools: window.selfTest(1000)
window.selfTest = function(iters = 1000) {
  let pass = 0, fail = 0;
  for (let i = 0; i < iters; i++) {
    const { pillars } = generatePillars(4);
    if (validateRound(pillars)) pass++; else fail++;
    const { pillars: p5 } = generatePillars(5);
    if (validateRound(p5)) pass++; else fail++;
  }
  console.log(`selfTest: ${pass} pass, ${fail} fail (of ${iters * 2})`);
  return { pass, fail };
};
</script>
